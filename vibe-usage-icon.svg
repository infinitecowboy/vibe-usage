<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8956F"/>
      <stop offset="100%" stop-color="#D06845"/>
    </linearGradient>
  </defs>
  
  <!-- Full-bleed square background — macOS applies its own squircle mask -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  
  <!-- "vu" text in monospace, centered upper portion -->
  <text x="512" y="430"
        text-anchor="middle"
        font-family="'SF Mono', 'Menlo', 'Courier New', 'Courier', monospace"
        font-size="330" font-weight="700"
        fill="white"
        letter-spacing="25">vu</text>
  
  <!-- Smile curve -->
  <path d="M 220 610 C 220 880 804 880 804 610"
        stroke="white" stroke-width="50" stroke-linecap="round" fill="none"/>
</svg>